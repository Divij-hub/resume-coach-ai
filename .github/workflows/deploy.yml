name: Deploy Resume Coach AI

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # Must match lambda.tf runtime

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ✅ FIX: Build lambda.zip BEFORE Terraform runs.
      # Terraform's filebase64sha256("lambda.zip") errors immediately
      # if the file doesn't exist on the runner.
      - name: Build Lambda ZIP
        run: |
          mkdir -p lambda_package/api
          pip install -r requirements.txt -t lambda_package/
          cp lambda_handler.py lambda_package/
          cp server.py lambda_package/
          cp api/index.py lambda_package/api/
          cd lambda_package
          zip -r ../infra/lambda.zip .

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init & Apply
        id: tf_apply
        working-directory: ./infra
        run: |
          terraform init
          terraform apply -auto-approve
          # Change 'api_url' to 'api_gateway_url' to match your Terraform code
          echo "api_url=$(terraform output -raw api_gateway_url)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)" >> $GITHUB_OUTPUT

      - name: Install Frontend Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Frontend
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: ${{ steps.tf_apply.outputs.api_url }}
        run: npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync out/ s3://${{ steps.tf_apply.outputs.frontend_bucket }}/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1JLNDN5VSU6Z2 \
            --paths "/*"